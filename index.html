<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendamos la Tabla del 3!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

    <main class="container">
        <button class="btn-probar">🚀 ¡PROBAR!</button>
        
        <h1 class="titulo-animado">✨ La Tabla del 3 ✨</h1>
        
        <div class="card-infantil">
            <table class="tabla-divertida">
                <thead>
                    <tr>
                        <th>Multiplicar</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>3 × 1</td><td><span class="badge">3</span></td></tr>
                    <tr><td>3 × 2</td><td><span class="badge">6</span></td></tr>
                    <tr><td>3 × 3</td><td><span class="badge">9</span></td></tr>
                    <tr><td>3 × 4</td><td><span class="badge">12</span></td></tr>
                    <tr><td>3 × 5</td><td><span class="badge">15</span></td></tr>
                    <tr><td>3 × 6</td><td><span class="badge">18</span></td></tr>
                    <tr><td>3 × 7</td><td><span class="badge">21</span></td></tr>
                    <tr><td>3 × 8</td><td><span class="badge">24</span></td></tr>
                    <tr><td>3 × 9</td><td><span class="badge">27</span></td></tr>
                    <tr><td>3 × 10</td><td><span class="badge">30</span></td></tr>
                </tbody>
            </table>
        </div>
        <footer class="creditos">
            CREADO POR: ALAN CHANATASIG / ALAMBRITO
        </footer>
    </main> 
    

</body>
</html>
